<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Scan Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #666;
    --accent: #f5a623;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }

  /* ── FLASH SCREEN ── */
  #flash-screen {
    position: fixed;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: background 0.08s ease;
  }
  #flash-screen.active { display: flex; }

  #colour-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(64px, 22vw, 140px);
    font-weight: 900;
    letter-spacing: -0.02em;
    text-transform: uppercase;
    color: #fff;
    text-shadow: 0 4px 40px rgba(0,0,0,0.5);
    pointer-events: none;
    user-select: none;
    line-height: 1;
  }

  #next-hint {
    margin-top: 24px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    pointer-events: none;
  }

  /* tap anywhere to dismiss */
  #flash-tap-zone {
    position: absolute;
    inset: 0;
    cursor: pointer;
  }

  /* ── HOME / SETUP SCREEN ── */
  #home-screen {
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .header {
    padding: 48px 24px 24px;
    border-bottom: 1px solid var(--border);
  }
  .header-eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .header h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 48px;
    font-weight: 900;
    letter-spacing: -0.01em;
    text-transform: uppercase;
    line-height: 1;
  }
  .header p {
    margin-top: 8px;
    font-size: 14px;
    color: var(--muted);
    line-height: 1.5;
  }

  .section {
    padding: 24px;
    border-bottom: 1px solid var(--border);
  }
  .section-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  /* colour toggles */
  .colour-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .colour-toggle {
    position: relative;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .colour-toggle.on { border-color: #fff; }
  .colour-toggle:active { transform: scale(0.96); }
  .colour-swatch {
    height: 60px;
    width: 100%;
  }
  .colour-label {
    padding: 6px 8px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: rgba(0,0,0,0.55);
    text-align: center;
  }
  .colour-toggle.on .colour-label { color: #fff; }
  .colour-toggle:not(.on) { opacity: 0.4; }
  .colour-check {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #fff;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .colour-toggle.on .colour-check { display: flex; }
  .colour-check svg { width: 11px; height: 11px; }

  /* interval slider */
  .interval-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .interval-row input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }
  .interval-row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 3px solid var(--bg);
  }
  #interval-display {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--accent);
    min-width: 56px;
    text-align: right;
  }

  /* mode toggle */
  .mode-pills {
    display: flex;
    background: var(--surface);
    border-radius: 10px;
    padding: 4px;
    gap: 4px;
  }
  .mode-pill {
    flex: 1;
    padding: 10px 8px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .mode-pill.active {
    background: var(--accent);
    color: #000;
  }
  .mode-desc {
    margin-top: 10px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
  }

  /* start button */
  .start-wrap {
    padding: 24px;
    padding-bottom: max(24px, env(safe-area-inset-bottom));
  }
  .btn-start {
    width: 100%;
    padding: 20px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 12px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 24px;
    font-weight: 900;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-start:active { transform: scale(0.98); }
  .btn-start:disabled { opacity: 0.35; cursor: default; }

  /* ── SESSION SCREEN ── */
  #session-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: none;
    flex-direction: column;
    z-index: 50;
  }
  #session-screen.active { display: flex; }

  .session-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    padding-top: max(16px, env(safe-area-inset-top));
    border-bottom: 1px solid var(--border);
  }
  .session-stat {
    text-align: center;
  }
  .session-stat-val {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 32px;
    font-weight: 900;
    color: var(--accent);
    line-height: 1;
  }
  .session-stat-lbl {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 2px;
  }

  .session-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    gap: 16px;
  }

  /* big countdown ring */
  #countdown-ring {
    position: relative;
    width: 200px;
    height: 200px;
    flex-shrink: 0;
  }
  #countdown-ring svg {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }
  #ring-bg { fill: none; stroke: var(--border); stroke-width: 8; }
  #ring-prog { fill: none; stroke: var(--accent); stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 0.15s linear, stroke 0.15s; }
  #countdown-num {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 72px;
    font-weight: 900;
    line-height: 1;
  }

  /* last colour shown */
  #last-colour-chip {
    padding: 10px 28px;
    border-radius: 8px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #fff;
    text-shadow: 0 1px 8px rgba(0,0,0,0.4);
    transition: background 0.2s;
  }
  .last-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* session controls */
  .session-controls {
    display: flex;
    gap: 12px;
    padding: 0 24px 24px;
    padding-bottom: max(24px, env(safe-area-inset-bottom));
  }
  .btn-ctrl {
    flex: 1;
    padding: 16px;
    border-radius: 12px;
    border: none;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.1s;
  }
  .btn-ctrl:active { transform: scale(0.97); }
  .btn-pause { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .btn-stop  { background: #1a0808; color: #e05050; border: 1px solid #3a1212; }

  /* ── HISTORY LOG (bottom of session) ── */
  .flash-log {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    padding: 0 20px;
    max-height: 60px;
    overflow: hidden;
  }
  .log-chip {
    padding: 3px 10px;
    border-radius: 20px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: rgba(255,255,255,0.85);
    opacity: 0;
    transform: scale(0.8);
    transition: opacity 0.2s, transform 0.2s;
  }
  .log-chip.show { opacity: 1; transform: scale(1); }

  /* ── Random mode flash overlay ── */
  #flash-screen { cursor: pointer; }

</style>
</head>
<body>

<!-- ═══════════════ HOME SCREEN ═══════════════ -->
<div id="home-screen">
  <div class="header">
    <div class="header-eyebrow">Scanning Trainer</div>
    <h1>Scan<br>Colours</h1>
    <p>Player scans over their shoulder — calls out the colour they see.</p>
  </div>

  <!-- colour selection -->
  <div class="section">
    <div class="section-label">Colours in play</div>
    <div class="colour-grid" id="colour-grid"></div>
  </div>

  <!-- interval -->
  <div class="section">
    <div class="section-label">Flash interval</div>
    <div class="interval-row">
      <input type="range" id="interval-slider" min="2" max="15" value="5" step="1">
      <div id="interval-display">5s</div>
    </div>
  </div>

  <!-- mode -->
  <div class="section">
    <div class="section-label">Mode</div>
    <div class="mode-pills">
      <button class="mode-pill active" data-mode="random">Random</button>
      <button class="mode-pill" data-mode="timed">Full-screen</button>
      <button class="mode-pill" data-mode="manual">Manual</button>
    </div>
    <div class="mode-desc" id="mode-desc">A new colour flashes at the set interval — player calls it out.</div>
  </div>

  <div class="start-wrap">
    <button class="btn-start" id="btn-start">Start Session</button>
  </div>
</div>

<!-- ═══════════════ SESSION SCREEN ═══════════════ -->
<div id="session-screen">
  <div class="session-header">
    <div class="session-stat">
      <div class="session-stat-val" id="stat-flashes">0</div>
      <div class="session-stat-lbl">Flashes</div>
    </div>
    <div class="session-stat">
      <div class="session-stat-val" id="stat-time">0:00</div>
      <div class="session-stat-lbl">Time</div>
    </div>
    <div class="session-stat">
      <div class="session-stat-val" id="stat-next">—</div>
      <div class="session-stat-lbl">Next in</div>
    </div>
  </div>

  <div class="session-body">
    <div id="countdown-ring">
      <svg viewBox="0 0 100 100">
        <circle id="ring-bg" cx="50" cy="50" r="44"/>
        <circle id="ring-prog" cx="50" cy="50" r="44"/>
      </svg>
      <div id="countdown-num">—</div>
    </div>

    <div class="last-label">Last shown</div>
    <div id="last-colour-chip">—</div>

    <div class="flash-log" id="flash-log"></div>
  </div>

  <div class="session-controls">
    <button class="btn-ctrl btn-pause" id="btn-pause">Pause</button>
    <button class="btn-ctrl btn-stop" id="btn-stop">End</button>
  </div>
</div>

<!-- ═══════════════ FULL-SCREEN FLASH ═══════════════ -->
<div id="flash-screen">
  <div id="flash-tap-zone"></div>
  <div id="colour-name">RED</div>
  <div id="next-hint">TAP TO CONTINUE</div>
</div>

<script>
// ── DATA ──────────────────────────────────────────
const COLOURS = [
  { name: 'Red',    hex: '#e03030' },
  { name: 'Blue',   hex: '#2563eb' },
  { name: 'Yellow', hex: '#f5c518' },
  { name: 'Green',  hex: '#22c55e' },
  { name: 'Orange', hex: '#f97316' },
  { name: 'Purple', hex: '#9333ea' },
  { name: 'White',  hex: '#e8e8e8' },
  { name: 'Pink',   hex: '#ec4899' },
  { name: 'Cyan',   hex: '#06b6d4' },
];

const MODES = {
  random:  'A new colour flashes at the set interval — player calls it out.',
  timed:   'Full-screen colour blast every interval. Hard to miss.',
  manual:  'Coach taps the button to trigger each flash — full control.',
};

// ── STATE ─────────────────────────────────────────
let activeColours = new Set(['Red','Blue','Yellow','Green','Orange']);
let interval      = 5;
let mode          = 'random';
let sessionActive = false;
let paused        = false;
let flashCount    = 0;
let sessionStart  = null;
let timerTick     = null;
let countdownVal  = 0;
let countdownMax  = 5;
let sessionElapsed = 0;
let lastColour    = null;

// ── DOM ───────────────────────────────────────────
const homeScreen    = document.getElementById('home-screen');
const sessionScreen = document.getElementById('session-screen');
const flashScreen   = document.getElementById('flash-screen');
const colourGrid    = document.getElementById('colour-grid');
const intervalSlider= document.getElementById('interval-slider');
const intervalDisp  = document.getElementById('interval-display');
const modeDesc      = document.getElementById('mode-desc');
const btnStart      = document.getElementById('btn-start');
const btnPause      = document.getElementById('btn-pause');
const btnStop       = document.getElementById('btn-stop');
const statFlashes   = document.getElementById('stat-flashes');
const statTime      = document.getElementById('stat-time');
const statNext      = document.getElementById('stat-next');
const cdNum         = document.getElementById('countdown-num');
const ringProg      = document.getElementById('ring-prog');
const lastChip      = document.getElementById('last-colour-chip');
const flashLog      = document.getElementById('flash-log');
const colourName    = document.getElementById('colour-name');
const flashTap      = document.getElementById('flash-tap-zone');

// ── BUILD COLOUR GRID ─────────────────────────────
COLOURS.forEach(c => {
  const div = document.createElement('div');
  div.className = 'colour-toggle' + (activeColours.has(c.name) ? ' on' : '');
  div.dataset.name = c.name;
  div.innerHTML = `
    <div class="colour-swatch" style="background:${c.hex}"></div>
    <div class="colour-label">${c.name}</div>
    <div class="colour-check"><svg viewBox="0 0 12 12" fill="none">
      <path d="M2 6l3 3 5-5" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg></div>
  `;
  div.addEventListener('click', () => {
    if (activeColours.has(c.name)) {
      if (activeColours.size <= 2) return; // keep min 2
      activeColours.delete(c.name);
      div.classList.remove('on');
    } else {
      activeColours.add(c.name);
      div.classList.add('on');
    }
    updateStartBtn();
  });
  colourGrid.appendChild(div);
});

function updateStartBtn() {
  btnStart.disabled = activeColours.size < 2;
}
updateStartBtn();

// ── INTERVAL SLIDER ───────────────────────────────
intervalSlider.addEventListener('input', () => {
  interval = parseInt(intervalSlider.value);
  intervalDisp.textContent = interval + 's';
});

// ── MODE PILLS ────────────────────────────────────
document.querySelectorAll('.mode-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.mode-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    mode = pill.dataset.mode;
    modeDesc.textContent = MODES[mode];
  });
});

// ── RING SETUP ────────────────────────────────────
const CIRC = 2 * Math.PI * 44;
ringProg.style.strokeDasharray = CIRC;
ringProg.style.strokeDashoffset = 0;

function setRing(fraction, colour) {
  ringProg.style.strokeDashoffset = CIRC * (1 - fraction);
  ringProg.style.stroke = colour || '#f5a623';
}

// ── SESSION HELPERS ───────────────────────────────
function pickColour() {
  const arr = COLOURS.filter(c => activeColours.has(c.name));
  // avoid repeating same colour twice
  let choices = arr.filter(c => !lastColour || c.name !== lastColour.name);
  if (!choices.length) choices = arr;
  return choices[Math.floor(Math.random() * choices.length)];
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return m + ':' + String(sec).padStart(2,'0');
}

function addLogChip(colour) {
  const chip = document.createElement('div');
  chip.className = 'log-chip';
  chip.textContent = colour.name;
  chip.style.background = colour.hex + 'aa';
  flashLog.prepend(chip);
  requestAnimationFrame(() => chip.classList.add('show'));
  // keep max 8 chips
  const chips = flashLog.querySelectorAll('.log-chip');
  if (chips.length > 8) chips[chips.length-1].remove();
}

// ── FLASH ─────────────────────────────────────────
function doFlash(colour) {
  lastColour = colour;
  flashCount++;
  statFlashes.textContent = flashCount;

  // update last chip in session
  lastChip.textContent = colour.name;
  lastChip.style.background = colour.hex;
  lastChip.style.color = isLight(colour.hex) ? '#000' : '#fff';

  addLogChip(colour);

  if (mode === 'timed') {
    showFullFlash(colour);
  }
}

function isLight(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return (r*299 + g*587 + b*114) / 1000 > 140;
}

function showFullFlash(colour) {
  flashScreen.style.background = colour.hex;
  colourName.textContent = colour.name;
  colourName.style.color = isLight(colour.hex) ? '#000' : '#fff';
  document.getElementById('next-hint').style.color = isLight(colour.hex) ? 'rgba(0,0,0,0.4)' : 'rgba(255,255,255,0.4)';
  flashScreen.classList.add('active');

  if (mode === 'timed') {
    // auto-dismiss after 1.5s
    setTimeout(() => flashScreen.classList.remove('active'), 1500);
  }
}

flashTap.addEventListener('click', () => {
  if (mode === 'manual') {
    flashScreen.classList.remove('active');
    if (!paused) resetCountdown();
  }
});

// ── COUNTDOWN ─────────────────────────────────────
function resetCountdown() {
  countdownVal = interval;
  countdownMax = interval;
  updateCountdownUI();
}

function updateCountdownUI() {
  cdNum.textContent = countdownVal;
  statNext.textContent = countdownVal + 's';
  setRing(countdownVal / countdownMax, '#f5a623');
}

// ── SESSION START / STOP ──────────────────────────
btnStart.addEventListener('click', startSession);
btnStop.addEventListener('click', endSession);
btnPause.addEventListener('click', togglePause);

function startSession() {
  sessionActive = true;
  paused = false;
  flashCount = 0;
  sessionElapsed = 0;
  lastColour = null;
  flashLog.innerHTML = '';
  statFlashes.textContent = '0';
  statTime.textContent = '0:00';

  homeScreen.style.display = 'none';
  sessionScreen.classList.add('active');

  resetCountdown();
  sessionStart = Date.now();
  timerTick = setInterval(tick, 1000);
}

function endSession() {
  clearInterval(timerTick);
  timerTick = null;
  sessionActive = false;
  flashScreen.classList.remove('active');
  sessionScreen.classList.remove('active');
  homeScreen.style.display = 'flex';
}

function togglePause() {
  paused = !paused;
  btnPause.textContent = paused ? 'Resume' : 'Pause';
  if (!paused) resetCountdown();
}

function tick() {
  if (paused) return;

  sessionElapsed++;
  statTime.textContent = formatTime(sessionElapsed);

  if (mode === 'manual') {
    // manual: tap button on session screen to flash
    return;
  }

  countdownVal--;
  updateCountdownUI();

  if (countdownVal <= 0) {
    const c = pickColour();
    doFlash(c);
    resetCountdown();
  }
}

// ── MANUAL TAP ────────────────────────────────────
// Tap the ring area to manually trigger flash
document.getElementById('countdown-ring').addEventListener('click', () => {
  if (!sessionActive || paused) return;
  if (mode === 'manual') {
    const c = pickColour();
    doFlash(c);
    showFullFlash(c);
    resetCountdown();
  }
});

// Keep screen awake (WakeLock API)
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      await navigator.wakeLock.request('screen');
    }
  } catch(e) {}
}
requestWakeLock();
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') requestWakeLock();
});
</script>
</body>
</html>
